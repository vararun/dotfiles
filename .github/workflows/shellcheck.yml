name: ShellCheck

on:
  push:
    paths:
      - "scripts/bootstrap.sh"
      - ".github/workflows/shellcheck.yml"
  pull_request:
    paths:
      - "scripts/bootstrap.sh"
      - ".github/workflows/shellcheck.yml"

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@v2
        with:
          scandir: "./scripts/bootstrap.sh"
          severity: "error"
